services:
  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml --dev
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    environment:
      - "LIVEKIT_KEYS=devkey: secret"
    restart: unless-stopped
    networks:
      - livekit-network

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - livekit
    env_file:
      - .env.local
    restart: unless-stopped
    networks:
      - livekit-network

networks:
  livekit-network:
    driver: bridge
